name: Load Prompt
description: Set JST time and load prompt file with envsubst

inputs:
  prompt-file:
    description: Path to the prompt file (e.g. prompts/hackernews.md)
    required: true

runs:
  using: composite
  steps:
    - name: Install envsubst
      shell: bash
      run: |
        if ! command -v envsubst &> /dev/null; then
          sudo apt-get update && sudo apt-get install -y gettext-base
        fi

    - name: Set JST time
      shell: bash
      run: echo "JST_TIME=$(TZ=Asia/Tokyo date '+%Y-%m-%dT%H:%M')" >> "$GITHUB_ENV"

    - name: Load prompt
      shell: bash
      run: |
        {
          echo 'AGENT_PROMPT<<PROMPT_EOF'
          envsubst < ${{ inputs.prompt-file }}
          echo 'PROMPT_EOF'
        } >> "$GITHUB_ENV"
