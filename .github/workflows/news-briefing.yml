name: Daily News Briefing

on:
  schedule:
    - cron: "3 23 * * *" # Every day at 23:03 UTC (08:03 JST)
  workflow_dispatch:

env:
  AGENT_SLUG: news-briefing
  AGENT_CATEGORY: summary

permissions:
  contents: write
  issues: write
  id-token: write

jobs:
  run-agent:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4

      - name: Load prompt
        run: |
          {
            echo 'AGENT_PROMPT<<PROMPT_EOF'
            envsubst < prompts/news-briefing.md
            echo 'PROMPT_EOF'
          } >> "$GITHUB_ENV"

      - uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ env.AGENT_PROMPT }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--dangerously-skip-permissions"
          show_full_output: true
