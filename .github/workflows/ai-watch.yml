name: AI Watch

on:
  schedule:
    - cron: "3 22 * * *" # JST 7:03 (daily)
  workflow_dispatch:

env:
  AGENT_SLUG: ai-watch
  AGENT_CATEGORY: analysis

permissions:
  contents: write
  issues: write
  id-token: write

jobs:
  run-agent:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/load-prompt
        with:
          prompt-file: prompts/ai-watch.md

      - uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ env.AGENT_PROMPT }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--dangerously-skip-permissions"
          show_full_output: true
