name: AI Watch

on:
  schedule:
    - cron: "0 22 * * *" # JST 7:00 (daily)
  workflow_dispatch:
    inputs:
      prompt:
        description: "Custom prompt for the agent"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: read
  id-token: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set JST time
        id: time
        run: echo "jst_time=$(TZ=Asia/Tokyo date '+%Y-%m-%dT%H:%M')" >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            ${{ inputs.prompt || '
            現在の日本時間: ${{ steps.time.outputs.jst_time }}

            AI・LLM の最新動向を1次ソースから収集し、日本語のデイリーレポートを生成せよ。

            ## データソースと取得方法

            以下のソースからデータを取得する。
            注意: WebFetch ツールでブロックされるサイトがあるため、データ取得には curl コマンドを使うこと。

            ### 1. Anthropic ブログ / ニュース
            - https://www.anthropic.com/news (HTML をパースして最新記事のタイトル・URL・日付を取得)
            - 直近1週間以内の新着記事をピックアップ

            ### 2. OpenAI ブログ
            - https://openai.com/news/ (HTML をパースして最新記事のタイトル・URL・日付を取得)
            - 直近1週間以内の新着記事をピックアップ

            ### 3. Google DeepMind ブログ
            - https://deepmind.google/discover/blog/ (HTML をパースして最新記事のタイトル・URL・日付を取得)
            - 直近1週間以内の新着記事をピックアップ

            ### 4. arxiv (AI/ML 新着論文)
            - https://rss.arxiv.org/rss/cs.AI (RSS をパース)
            - https://rss.arxiv.org/rss/cs.CL (RSS をパース)
            - タイトル・著者・abstract から注目論文を選出

            ### 5. Hugging Face トレンド
            - https://huggingface.co/api/trending (JSON)
            - トレンドのモデル・データセット・スペースから注目のものをピックアップ
            - 各モデルのURLは https://huggingface.co/{id} の形式でリンクすること

            ### 6. LMSYS Chatbot Arena
            - https://huggingface.co/spaces/lmsys/chatbot-arena-leaderboard (リーダーボードの変動を確認)
            - もしアクセスできない場合はスキップしてよい

            ## 取得失敗時の対応

            各ソースの取得が失敗した場合（HTTP エラー、パース不能など）は、そのソースをスキップしてレポートに「取得失敗」と明記する。
            最低2ソース以上のデータが取得できればレポートを生成する。全ソース失敗の場合はレポートを生成しない。

            ## 重複排除

            src/content/reports/ ディレクトリ内でファイル名に "ai-watch" を含むものをファイル名の降順でソートし、直近3件を読み込む。
            過去に取り上げたネタと同一または非常に類似したトピックは除外すること。
            ただし、重要な続報（新モデルのベンチマーク結果発表など）は続報として取り上げてよい。

            ## レポート形式

            output-report skill に従い src/content/reports/ にファイルを作成する。
            - category: "analysis"
            - title: "AI Watch（{日本時間の日付}）" の形式にする（例: AI Watch（2026年3月6日））
            - slug: ai-watch (例: 2026-03-06-22-00-ai-watch.md)
            - tags: 記事の内容に応じて自由にタグをつける（例: "llm", "multimodal", "benchmark", "open-source", "safety", "agents" など）。ソース名をタグにする必要はない

            本文の構造:

            まず ## 今日のハイライト セクションで、最も重要なニュース1-2件を簡潔にまとめる。

            次にソース別セクション:

            ## 企業動向
            Anthropic, OpenAI, Google DeepMind のブログから新着があればまとめる。
            新着がない場合はこのセクションを省略する。
            - **[タイトル](url)** ({企業名}) - 日本語で内容の解説・意義

            ## 注目論文
            arxiv から注目の論文を3-5件ピックアップ。
            - **[タイトル](url)** ({著者略}) - 何が新しいのか・なぜ重要かを1-2文で解説

            ## オープンソース・モデル
            Hugging Face のトレンドから注目のモデル・ツールを3-5件ピックアップ。
            - **[名前](url)** - 何ができるか・なぜ注目かを1-2文で解説

            ## ベンチマーク・リーダーボード
            LMSYS やその他ベンチマークの変動があれば報告。なければ省略。

            最後に ## 所感 セクションで、全体を通じた AI 分野のトレンドや気づきを2-3文でコメントする。
            ' }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--dangerously-skip-permissions"
          show_full_output: true
