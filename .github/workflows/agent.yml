name: Ambient Agent

on:
  schedule:
    - cron: "0 0 * * 1" # Every Monday at 00:00 UTC
  workflow_dispatch:
    inputs:
      prompt:
        description: "Custom prompt for the agent"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: read
  id-token: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            ${{ inputs.prompt || 'Review this repository. Generate a weekly summary report following the output-report skill instructions.' }}

            Use the skill defined in .github/skills/output-report.md for output format.
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
          # For Max subscription (OAuth), use the auto-configured token.
          # For API key, uncomment below:
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
