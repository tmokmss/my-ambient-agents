name: Hacker News Summary

on:
  schedule:
    - cron: "3 0,12 * * *" # Every day at 00:03 and 12:03 UTC
  workflow_dispatch:

env:
  AGENT_SLUG: hackernews-top10
  AGENT_CATEGORY: summary

permissions:
  contents: write
  issues: write
  id-token: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/load-prompt
        with:
          prompt-file: prompts/hackernews.md

      - uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ env.AGENT_PROMPT }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--dangerously-skip-permissions"
          show_full_output: true
