name: Buzz Digest

on:
  schedule:
    - cron: "3 23,7,13 * * *" # JST 8:03, 16:03, 22:03
  workflow_dispatch:

env:
  AGENT_SLUG: buzz-digest
  AGENT_CATEGORY: buzz

permissions:
  contents: write
  issues: write
  id-token: write

jobs:
  run-agent:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4

      - name: Set JST time
        run: echo "JST_TIME=$(TZ=Asia/Tokyo date '+%Y-%m-%dT%H:%M')" >> "$GITHUB_ENV"

      - name: Load prompt
        run: |
          {
            echo 'AGENT_PROMPT<<PROMPT_EOF'
            envsubst < prompts/buzz-digest.md
            echo 'PROMPT_EOF'
          } >> "$GITHUB_ENV"

      - uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ env.AGENT_PROMPT }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--dangerously-skip-permissions"
          show_full_output: true
        env:
          YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
