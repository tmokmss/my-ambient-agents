name: Buzz Digest

on:
  schedule:
    - cron: "0 23,7,13 * * *" # JST 8:00, 16:00, 22:00
  workflow_dispatch:
    inputs:
      prompt:
        description: "Custom prompt for the agent"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: read
  id-token: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set JST time
        id: time
        run: echo "jst_time=$(TZ=Asia/Tokyo date '+%Y-%m-%dT%H:%M')" >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            ${{ inputs.prompt || '
            現在の日本時間: ${{ steps.time.outputs.jst_time }}

            世界のバズ・トレンドを収集し、暇つぶしに読めるダイジェストレポートを日本語で生成せよ。

            ## データソースと取得方法

            以下の5ソースからデータを取得する。
            注意: WebFetch ツールでブロックされるサイトがあるため、データ取得には curl コマンドを使うこと。
            Reddit は User-Agent ヘッダが必須（例: curl -H "User-Agent: ambient-agents/1.0"）。

            ### 1. Reddit (海外バズ)
            - https://www.reddit.com/r/all/hot.json?limit=20
            各投稿の title, url, score, num_comments, subreddit を取得。

            ### 2. The Verge (英語圏テック・カルチャー)
            RSSを取得してパース:
            - https://www.theverge.com/rss/index.xml
            各エントリの title, link, description を取得。

            ### 3. Bilibili (中国トレンド)
            - https://api.bilibili.com/x/web-interface/ranking/v2?rid=0&type=all
            data.list から上位の動画タイトル・再生数・説明を取得。
            各動画のURLは https://www.bilibili.com/video/{bvid} の形式でリンクすること。

            ### 4. はてなブックマーク (日本のホットエントリ)
            RSSを取得してパース:
            - https://b.hatena.ne.jp/hotentry/it.rss (テクノロジー)
            - https://b.hatena.ne.jp/hotentry/general.rss (総合)
            各エントリの title, link, description, bookmarkcount を取得。

            ### 5. Togetter (X/Twitterまとめ)
            RSSを取得してパース:
            - https://togetter.com/rss/hot
            各エントリの title, link, description を取得。

            ## 重複排除

            src/content/reports/ ディレクトリ内でファイル名に "buzz-digest" を含むものをファイル名の降順でソートし、直近3件を読み込む。
            過去に取り上げたネタと同一または非常に類似したトピックは除外すること。
            同じURL、同じ話題の別記事、同一事件の続報などは重複とみなす。

            ## レポート形式

            output-report skill に従い src/content/reports/ にファイルを作成する。
            - category: "buzz"
            - title: "世界バズ・ダイジェスト（{日本時間の日付}）" の形式にする（例: 世界バズ・ダイジェスト（2026年3月6日））
            - slug: buzz-digest (例: 2026-03-06-08-00-buzz-digest.md)
            - tags: 記事の内容に応じて自由にタグをつける（例: "ai", "gaming", "politics", "security", "culture" など）。ソース名をタグにする必要はない

            本文の構造:

            ソース別にセクションを分け、各ソースから面白い・注目すべきトピックを3-5件ピックアップする。
            単なるタイトル列挙ではなく、なぜ面白いのか・何が話題なのかを1-2文で解説する。

            ## Reddit
            - **[タイトル](url)** (r/{subreddit}, {score}pt) - 日本語で内容の解説

            ## The Verge
            - **[タイトル](url)** - 日本語で内容の解説

            ## Bilibili
            - **[タイトル](url)** ({再生数}) - 日本語で内容の解説

            ## はてなブックマーク
            - **[タイトル](url)** ({users}users) - 日本語で内容の解説

            ## Togetter
            - **[タイトル](url)** - 日本語で内容の解説

            最後に ## ひとこと セクションで、全体を通じて気になったトピックを1つだけ取り上げて軽くコメントする。
            ' }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--dangerously-skip-permissions"
          show_full_output: true
