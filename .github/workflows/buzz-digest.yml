name: Buzz Digest

on:
  schedule:
    - cron: "3 23,7,13 * * *" # JST 8:03, 16:03, 22:03
  workflow_dispatch:

env:
  AGENT_SLUG: buzz-digest
  AGENT_CATEGORY: buzz

permissions:
  contents: write
  issues: write
  id-token: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/load-prompt
        with:
          prompt-file: prompts/buzz-digest.md

      - uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ env.AGENT_PROMPT }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--dangerously-skip-permissions"
          show_full_output: true
        env:
          YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
