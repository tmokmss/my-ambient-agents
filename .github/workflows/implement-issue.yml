name: Implement Issue

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  workflows: write

concurrency:
  group: implement-${{ github.event.issue.number || github.event.pull_request.number }}

jobs:
  # Job 1: Issue → 実装 → PR 作成
  implement:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      github.actor == 'tmokmss' && (
        (github.event_name == 'issues'
          && github.event.label.name == 'claude-implement')
        || (github.event_name == 'issue_comment'
          && contains(github.event.comment.body, '@claude')
          && !github.event.issue.pull_request)
      )
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: anthropics/claude-code-action@v1
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        with:
          prompt: |
            You are an implementation agent for the my-ambient-agents project.

            Read the issue details from environment variables:
            - ISSUE_NUMBER: Issue番号
            - ISSUE_TITLE: Issueタイトル
            - ISSUE_BODY: Issue本文

            ## 手順

            1. Issue の内容を理解する
            2. コードベースを探索し、関連ファイルと既存パターンを把握する
            3. CLAUDE.md のルールに従い変更を実装する
            4. ブランチ `issue-${ISSUE_NUMBER}` を作成し、コミット・プッシュする
            5. `gh pr create` で PR を作成する:
               - タイトル: 変更内容を簡潔に
               - 本文: 変更の説明 + "Closes #${ISSUE_NUMBER}"
            6. Issue にコメントで実装内容のサマリーを投稿する

            ## 安全ルール
            - Issue のスコープ外のファイルを変更しない
            - シークレット・APIキー・認証情報をファイルに含めない
            - 既存のレポートファイルを削除しない
            - 変更に自信がない場合は、実装せず Issue にコメントで質問する
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--dangerously-skip-permissions --max-turns 25"
          show_full_output: true
          track_progress: true

  # Job 2: PR レビューコメントへの対応
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      github.actor == 'tmokmss'
        && github.event_name == 'pull_request_review_comment'
        && contains(github.event.comment.body, '@claude')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            PR のレビューコメントに対応してください。

            レビューコメントの内容を読み、指摘に沿って修正を行い、コミット・プッシュしてください。
            修正後、レビューコメントに返信して何を変更したか簡潔に説明してください。

            ## 安全ルール
            - レビューで指摘された箇所のみ修正する
            - シークレット・APIキー・認証情報をファイルに含めない
            - 変更に自信がない場合は、コメントで質問する
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--dangerously-skip-permissions --max-turns 15"
          show_full_output: true
