name: Tech Feed Digest

on:
  schedule:
    - cron: "3 21,9 * * *" # JST 6:03, 18:03
  workflow_dispatch:

env:
  AGENT_SLUG: tech-feed
  AGENT_CATEGORY: summary

permissions:
  contents: write
  issues: write
  id-token: write

jobs:
  run-agent:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v4

      - name: Set JST time
        run: echo "JST_TIME=$(TZ=Asia/Tokyo date '+%Y-%m-%dT%H:%M')" >> "$GITHUB_ENV"

      - name: Load prompt
        run: |
          {
            echo 'AGENT_PROMPT<<PROMPT_EOF'
            envsubst < prompts/tech-feed.md
            echo 'PROMPT_EOF'
          } >> "$GITHUB_ENV"

      - uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ env.AGENT_PROMPT }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--dangerously-skip-permissions"
          show_full_output: true
